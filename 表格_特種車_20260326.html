    <div id="simple-lightbox" onclick="this.style.display='none'">
        <img id="lightbox-feat-img">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const lightbox = document.getElementById('simple-lightbox');
            const lightboxImg = document.getElementById('lightbox-feat-img');
            
            document.querySelectorAll('.content img').forEach(img => {
                // 移除外層連結 (避免閃爍) 並改為內部顯示
                if (img.parentElement.tagName === 'A') {
                    img.parentElement.onclick = function(e) {
                        e.preventDefault();
                        lightbox.style.display = 'flex';
                        lightboxImg.src = img.src;
                    };
                } else {
                    img.onclick = function() {
                        lightbox.style.display = 'flex';
                        lightboxImg.src = img.src;
                    };
                }
            });
        });
    </script>
